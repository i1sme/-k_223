version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: minitwitter
      POSTGRES_PASSWORD: minitwitter
      POSTGRES_DB: minitwitter
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minitwitter"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: minitwitter
      DB_PASSWORD: minitwitter
      DB_NAME: minitwitter
      JWT_SECRET: minitwitter_jwt_secret_change_in_production
      NODE_ENV: development
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  db_data:
